name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ai-volunteer-mvp/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('ai-volunteer-mvp/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (frontend)
        working-directory: ./ai-volunteer-mvp/frontend
        run: npm ci --no-audit --prefer-offline --no-progress

      - name: Build frontend (capture logs)
        working-directory: ./ai-volunteer-mvp/frontend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: ./ai-volunteer-mvp/frontend/build.log
